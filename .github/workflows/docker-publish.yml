name: Docker 镜像构建与发布

# 将 wiki 服务打包为生产 Docker 镜像，推送到 GitHub Container Registry (ghcr.io)。
#
# 触发时机：
#   - push 到 main：构建并推送，标签含 latest、main、commit sha
#   - 推送版本标签 v*.*.*：额外打上 semver 标签（如 v1.2.3 → 1.2.3, 1.2）
#   - PR：运行测试 + 构建验证，不推送镜像
#   - workflow_dispatch：在 Actions 页面手动触发
#
# 服务器拉取示例（需将 PACKAGE 设为仓库可见性或配置 read:packages）：
#   docker pull ghcr.io/<owner>/wiki:main
#   docker run -d -p 8081:8081 \
#     -e MYSQL_PASSWORD=xxx -e REDIS_PASSWORD=xxx \
#     -e OPENAI_API_KEY=xxx -e DEEPSEEK_API_KEY=xxx \
#     ghcr.io/<owner>/wiki:main

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Go 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: svr/go.mod
          cache: true
          cache-dependency-path: svr/go.sum

      - name: 运行测试
        working-directory: svr
        run: go test ./tests/...

  build:
    name: 构建并推送镜像
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: 构建并推送 Docker 镜像
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 安装 Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: 写入镜像签名
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
